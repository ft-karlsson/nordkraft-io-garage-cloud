name: Release to Public Repo

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-amd64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-arm64
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Build binary
      run: |
        cd client-cli
        cargo build --release --target ${{ matrix.target }}
        
        # Create platform directory and copy binary
        mkdir -p ../dist/${{ matrix.platform }}
        cp target/${{ matrix.target }}/release/nordkraft ../dist/${{ matrix.platform }}/
        
        # Create tarball
        cd ../dist
        tar -czf nordkraft-${{ matrix.platform }}.tar.gz -C ${{ matrix.platform }} nordkraft
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nordkraft-${{ matrix.platform }}
        path: dist/nordkraft-${{ matrix.platform }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist/
    
    - name: Prepare release assets
      run: |
        # Move artifacts to root of dist directory
        find dist/ -name "*.tar.gz" -exec mv {} dist/ \;
        ls -la dist/*.tar.gz
    
    - name: Create Release on Public Repo
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Nordkraft CLI ${{ github.ref_name }}
        body: |
          ## Nordkraft CLI ${{ github.ref_name }}
          
          Secure container cloud management CLI.
          
          ### Installation
          
          ```bash
          curl -fsSL https://cloud.nordkraft.io/install.sh | sh
          ```
          
          ### Platform Downloads
          
          - **macOS (Intel)**: nordkraft-darwin-amd64.tar.gz
          - **macOS (Apple Silicon)**: nordkraft-darwin-arm64.tar.gz  
          - **Linux (AMD64)**: nordkraft-linux-amd64.tar.gz
          
          ### Quick Start
          
          ```bash
          # Test connection
          nordkraft auth login
          
          # List containers
          nordkraft container list
          
          # Deploy a container
          nordkraft container deploy --image nginx:alpine --port 8080
          ```
        files: |
          dist/nordkraft-*.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
